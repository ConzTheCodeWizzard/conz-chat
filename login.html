<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #000000, #2b0000, #500000);
  font-family: Arial;
  color: white;
}

.container {
  background: rgba(0,0,0,0.8);
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 0 25px red;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
  color: red;
}

input {
  width: 250px;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 200px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px red;
}
</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  let user = document.getElementById("user").value.trim();
  let pass = document.getElementById("pass").value.trim();

  let users = JSON.parse(localStorage.getItem("users")) || {};

  if (users[user] && users[user].password === pass) {
    localStorage.setItem("currentUser", user);
    window.location.href = "chat.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
