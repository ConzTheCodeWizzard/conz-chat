<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConzTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: #202020;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      color: red;
      margin: 0;
    }

    .search-bar {
      width: 40%;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    .upload-section {
      padding: 20px;
      background: #181818;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .video-card {
      background: #202020;
      padding: 10px;
      border-radius: 10px;
    }

    video {
      width: 100%;
      border-radius: 8px;
    }

    input, button {
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: red;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>ConzTube</h1>
  <input type="text" id="search" class="search-bar" placeholder="Search videos...">
</header>

<div class="upload-section">
  <h2>Upload Video</h2>
  <input type="file" id="videoUpload" accept="video/*"><br>
  <input type="text" id="videoTitle" placeholder="Video title"><br>
  <button onclick="uploadVideo()">Upload</button>
</div>

<div class="video-grid" id="videoGrid"></div>

<script>
  let videos = JSON.parse(localStorage.getItem("videos")) || [];

  function uploadVideo() {
    const fileInput = document.getElementById("videoUpload");
    const titleInput = document.getElementById("videoTitle");

    const file = fileInput.files[0];
    const title = titleInput.value;

    if (!file || !title) {
      alert("Please select a video and enter a title");
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      const videoData = e.target.result;

      videos.push({ title, url: videoData });
      localStorage.setItem("videos", JSON.stringify(videos));
      renderVideos();
    };

    reader.readAsDataURL(file);

    fileInput.value = "";
    titleInput.value = "";
  }

  function renderVideos(filter = "") {
    const grid = document.getElementById("videoGrid");
    grid.innerHTML = "";

    videos
      .filter(v => v.title.toLowerCase().includes(filter.toLowerCase()))
      .forEach(video => {
        const card = document.createElement("div");
        card.className = "video-card";

        card.innerHTML = `
          <video controls src="${video.url}"></video>
          <p>${video.title}</p>
        `;

        grid.appendChild(card);
      });
  }

  document.getElementById("search").addEventListener("input", (e) => {
    renderVideos(e.target.value);
  });

  renderVideos();
</script>

</body>
</html>
