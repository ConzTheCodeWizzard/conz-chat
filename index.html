<!DOCTYPE html>
<html>
<head>
  <title>Conz Chat</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #000000, #1a0000, #330000);
      font-family: Arial;
      color: white;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 45px;
      color: red;
      text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 30px black;
      letter-spacing: 3px;
    }

    .subtitle {
      margin-bottom: 30px;
      font-size: 18px;
      opacity: 0.9;
    }

    .box {
      background: rgba(0,0,0,0.8);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px red;
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      margin-bottom: 20px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: red;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px red;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px red;
    }

    .mainButtons {
      display: none;
      margin-top: 25px;
    }

    .mainButtons button {
      margin-top: 15px;
    }

    .createBtn {
      background: black;
      border: 2px solid red;
    }
  </style>
</head>
<body>

  <h1>Conz's Super Lock</h1>
  <div class="subtitle">Type the password to gain access</div>

  <div class="box">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="checkPassword()">Access Conz Chat</button>

    <div class="mainButtons" id="mainButtons">
      <button onclick="location.href='login.html'">Login</button>
      <button class="createBtn" onclick="location.href='create.html'">Create Account</button>
    </div>
  </div>

  <script>
    function checkPassword() {
      let password = document.getElementById("password").value;

      if (password === "ConzIsSick") {
        document.body.innerHTML = `
  <div style="
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: url('https://images.alphacoders.com/140/1403500.jpeg') no-repeat center center fixed;
background-size: cover;
    font-family: Arial;
    color: white;
  ">
    <h1 style="
      margin-bottom: 60px;
      font-size: 50px;
      color: red;
      text-shadow: 0 0 10px red, 0 0 20px red, 0 0 30px black;
      letter-spacing: 3px;
    ">
      CONZ CHAT
    </h1>

    <div style="
      background: rgba(0,0,0,0.7);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px red;
    ">
      <button onclick="location.href='login.html'" style="
        display: block;
        margin: 15px auto;
        padding: 15px;
        width: 220px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: red;
        color: white;
      ">
        Login
      </button>

      <button onclick="location.href='create.html'" style="
        display: block;
        margin: 15px auto;
        padding: 15px;
        width: 220px;
        font-size: 18px;
        border: 2px solid red;
        border-radius: 10px;
        cursor: pointer;
        background: black;
        color: white;
      ">
        Create Account
      </button>
    </div>
  </div>
`;
      } else {
        document.body.insertAdjacentHTML("beforeend", `
  <div id="popup" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  ">
    <div style="
      background: #111;
      border: 3px solid red;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 20px red;
      max-width: 320px;
    ">
      <img src="https://static.vecteezy.com/system/resources/previews/021/604/700/non_2x/evil-devil-head-cartoon-free-vector.jpg" style="
        width: 180px;
        border-radius: 15px;
        margin-bottom: 15px;
      ">

      <h2 style="
        color: red;
        margin: 0 0 15px 0;
        text-shadow: 0 0 10px red;
      ">
        WHO TF ARE YOU!?
      </h2>

      <button onclick="document.getElementById('popup').remove()" style="
        padding: 10px 20px;
        background: red;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      ">
        Close
      </button>
    </div>
  </div>
`);
      }
    }
  </script>

</body>
</html>
