<!DOCTYPE html>
<html>
<head>
<title>Conz Snake 🐍</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden; /* stop page moving */
  background: black;
  touch-action: none;
  font-family: Arial;
  color: white;
}

/* full screen canvas */
canvas {
  display: block;
  background: #000;
}

/* UI overlay */
#ui {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}

h1 {
  margin: 0;
  color: red;
  text-shadow: 0 0 10px red;
}

#score {
  font-size: 16px;
}

button {
  margin-top: 5px;
  padding: 6px 12px;
  background: black;
  color: white;
  border: 1px solid red;
  border-radius: 6px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
  <h1>CONZ SNAKE 🐍</h1>
  <div id="score">Score: 0 | High: 0</div>
  <button onclick="restartGame()">Restart</button>
</div>

<audio id="eatSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="gameOverSound" src="https://assets.mixkit.co/active_storage/sfx/2698/2698-preview.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gridSize = 20;
let snake, direction, food, score, highScore, game;

const eatSound = document.getElementById("eatSound");
const gameOverSound = document.getElementById("gameOverSound");

// FULLSCREEN SIZE
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function init() {
  snake = [{ x: 10, y: 10 }];
  direction = "RIGHT";
  score = 0;
  highScore = localStorage.getItem("highScore") || 0;

  spawnFood();
}

function spawnFood() {
  food = {
    x: Math.floor(Math.random() * (canvas.width / gridSize)),
    y: Math.floor(Math.random() * (canvas.height / gridSize))
  };
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // draw snake
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? "lime" : "green";
    ctx.fillRect(
      snake[i].x * gridSize,
      snake[i].y * gridSize,
      gridSize,
      gridSize
    );
  }

  // draw food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

  let head = { ...snake[0] };

  if (direction === "LEFT") head.x--;
  if (direction === "RIGHT") head.x++;
  if (direction === "UP") head.y--;
  if (direction === "DOWN") head.y++;

  // collision with walls
  if (
    head.x < 0 ||
    head.y < 0 ||
    head.x >= canvas.width / gridSize ||
    head.y >= canvas.height / gridSize ||
    hitSelf(head)
  ) {
    clearInterval(game);
    gameOverSound.play();
    alert("Game Over 😭 Score: " + score);
    return;
  }

  // eat
  if (head.x === food.x && head.y === food.y) {
    score++;
    eatSound.play();

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
    }

    spawnFood();
  } else {
    snake.pop();
  }

  snake.unshift(head);

  document.getElementById("score").innerText =
    "Score: " + score + " | High: " + highScore;
}

function hitSelf(head) {
  for (let i = 1; i < snake.length; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) return true;
  }
  return false;
}

// keyboard
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
  if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
});

// swipe (fixed + responsive)
let startX = 0;
let startY = 0;

canvas.addEventListener("touchstart", (e) => {
  const t = e.touches[0];
  startX = t.clientX;
  startY = t.clientY;
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();

  const t = e.touches[0];
  let dx = t.clientX - startX;
  let dy = t.clientY - startY;

  if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0 && direction !== "LEFT") direction = "RIGHT";
      else if (dx < 0 && direction !== "RIGHT") direction = "LEFT";
    } else {
      if (dy > 0 && direction !== "UP") direction = "DOWN";
      else if (dy < 0 && direction !== "DOWN") direction = "UP";
    }

    startX = t.clientX;
    startY = t.clientY;
  }
}, { passive: false });

function restartGame() {
  clearInterval(game);
  init();
  game = setInterval(draw, 100);
}

// start
init();
game = setInterval(draw, 100);
</script>

</body>
</html>
