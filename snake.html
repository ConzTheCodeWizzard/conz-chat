<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONZ SNAKE 🐍</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #220000, #000);
  font-family: Arial;
  color: white;
}

canvas {
  display: block;
  touch-action: none;
}

#ui {
  position: fixed;
  top: 10px;
  width: 100%;
  text-align: center;
}

button {
  margin-top: 5px;
  padding: 8px 16px;
  background: black;
  border: 2px solid red;
  color: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="ui">
  <div id="score">Score: 0 | High: 0</div>
  <button onclick="restart()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const grid = 25;

let snake, dir, food, score, high, enemies;

function init(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  food = spawnFood();
  score = 0;
  high = localStorage.getItem("high") || 0;
  enemies = [];
}

function spawnFood(){
  return {
    x: Math.floor(Math.random() * (canvas.width/grid)),
    y: Math.floor(Math.random() * (canvas.height/grid))
  }
}

function spawnEnemy(){
  enemies.push({
    x: Math.floor(Math.random() * (canvas.width/grid)),
    y: Math.floor(Math.random() * (canvas.height/grid)),
    size: Math.floor(Math.random()*3)+1,
    bites: 0,
    dir: randomDir()
  });
}

function randomDir(){
  const d = [
    {x:1,y:0},{x:-1,y:0},
    {x:0,y:1},{x:0,y:-1}
  ];
  return d[Math.floor(Math.random()*d.length)];
}

setInterval(spawnEnemy, 2500);

// swipe controls
let sx=0, sy=0;
canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});

canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX - sx;
  let dy=e.changedTouches[0].clientY - sy;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0 && dir.x!==-1) dir={x:1,y:0};
    else if(dx<0 && dir.x!==1) dir={x:-1,y:0};
  } else {
    if(dy>0 && dir.y!==-1) dir={x:0,y:1};
    else if(dy<0 && dir.y!==1) dir={x:0,y:-1};
  }
});

function drawLeaf(x,y){
  ctx.fillStyle="lime";
  ctx.beginPath();
  ctx.moveTo(x,y+12);
  ctx.quadraticCurveTo(x+12,y-8,x+25,y+12);
  ctx.quadraticCurveTo(x+12,y+30,x,y+12);
  ctx.fill();
}

function game(){

  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  snake.unshift(head);

  // food
  if(head.x===food.x && head.y===food.y){
    score++;
    food = spawnFood();
  } else {
    snake.pop();
  }

  // wall
  if(
    head.x < 0 || head.y < 0 ||
    head.x > canvas.width/grid ||
    head.y > canvas.height/grid
  ){
    gameOver();
  }

  // self
  for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      gameOver();
    }
  }

  // enemies
  enemies.forEach((e,i)=>{

    e.x += e.dir.x;
    e.y += e.dir.y;

    if(Math.random()<0.05) e.dir = randomDir();

    if(e.x===head.x && e.y===head.y){

      // 🟢 YOU EAT THEM
      if(snake.length > e.size){

        score += e.size;

        for(let j=0;j<e.size;j++){
          snake.push({...snake[snake.length-1]});
        }

        enemies.splice(i,1);
        return;
      }

      // 🔴 THEY DAMAGE YOU
      if(e.bites < 3){

        e.bites++;

        let dmg = e.size;
        snake.splice(-dmg);
        score -= dmg;

        if(score < 0) score = 0;

        if(snake.length <= 0){
          gameOver();
        }
      }

      if(e.bites >= 3){
        enemies.splice(i,1);
      }
    }

    // draw enemy
    ctx.shadowBlur=20;
    ctx.shadowColor="red";
    ctx.fillStyle="red";
    ctx.fillRect(e.x*grid,e.y*grid,grid,grid);
  });

  // draw snake
  snake.forEach((s,i)=>{
    ctx.shadowBlur=20;
    ctx.shadowColor="lime";
    ctx.fillStyle = i===0 ? "#00ffcc" : "#00aa66";
    ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
  });

  drawLeaf(food.x*grid,food.y*grid);

  if(score > high){
    high = score;
    localStorage.setItem("high", high);
  }

  document.getElementById("score").innerText =
    "Score: " + score + " | High: " + high;

  setTimeout(game, 100);
}

function gameOver(){
  alert("Game Over");
  restart();
}

function restart(){
  init();
}

init();
game();
</script>

</body>
</html>
