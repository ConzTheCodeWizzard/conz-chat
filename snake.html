<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conz Snake</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

canvas {
  display: block;
  touch-action: none;
}

.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#gameOver, #bombDeath { display:none; }

button {
  padding: 12px 25px;
  border: 2px solid red;
  background: black;
  color: white;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>WELCOME TO CONZ SNAKE</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver" class="screen">
  <h1>💀 YOU DIED 💀</h1>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<div id="bombDeath" class="screen">
  <h1>💣 BOOM 💣</h1>
  <p>Seriously... you didn't see that? 🤡</p>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let grid = 25;
let cols, rows;

let snake, dir, food, bombs;
let score = 0;
let high = localStorage.getItem("high") || 0;

let running = false;
let lastMove = 0;
let bombTimer = 0;
let speed = 120;

let audioCtx;

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / grid);
  rows = Math.floor(canvas.height / grid);
}
resize();
window.addEventListener("resize", resize);

// 🔊 better sounds
function chomp(){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(500, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime+0.15);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.2);
  o.stop(audioCtx.currentTime+0.2);
}

function boom(){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.type = "sawtooth";
  o.frequency.setValueAtTime(120, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime+0.3);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3);
  o.stop(audioCtx.currentTime+0.3);
}

// init
function init(){
  let cx = Math.floor(cols/2);
  let cy = Math.floor(rows/2);

  snake = [
    {x:cx,y:cy},
    {x:cx-1,y:cy},
    {x:cx-2,y:cy}
  ];

  dir = {x:1,y:0};
  food = spawnFood();
  bombs = [];
  score = 0;
}

// safe food
function spawnFood(){
  return {
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows)
  };
}

// bomb
function spawnBomb(){
  bombs.push({
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows),
    life: 2000
  });
}

// swipe
let sx=0, sy=0;
canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0 && dir.x!==-1) dir={x:1,y:0};
    else if(dx<0 && dir.x!==1) dir={x:-1,y:0};
  } else {
    if(dy>0 && dir.y!==-1) dir={x:0,y:1};
    else if(dy<0 && dir.y!==1) dir={x:0,y:-1};
  }
});

// draw snake properly
function drawSnake(){
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? "#00ffcc" : "#00aa66";

    ctx.beginPath();
    ctx.roundRect(s.x*grid, s.y*grid, grid, grid, 8);
    ctx.fill();

    // eyes on head
    if(i===0){
      ctx.fillStyle="black";
      ctx.fillRect(s.x*grid+6, s.y*grid+6, 4,4);
      ctx.fillRect(s.x*grid+15, s.y*grid+6, 4,4);
    }
  });
}

// draw bomb
function drawBomb(b){
  let x = b.x*grid + grid/2;
  let y = b.y*grid + grid/2;

  ctx.fillStyle="#222";
  ctx.beginPath();
  ctx.arc(x,y,10,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="orange";
  ctx.beginPath();
  ctx.moveTo(x,y-10);
  ctx.lineTo(x,y-18);
  ctx.stroke();

  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(x,y-20,3,0,Math.PI*2);
  ctx.fill();
}

// loop
function loop(time){
  if(!running) return;

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(time - lastMove > speed){
    lastMove = time;

    let head = {
      x: snake[0].x + dir.x,
      y: snake[0].y + dir.y
    };

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
      score++;
      chomp();
      food = spawnFood();
    } else {
      snake.pop();
    }

    if(head.x<0||head.y<0||head.x>=cols||head.y>=rows){
      return normalDeath();
    }

    for(let i=1;i<snake.length;i++){
      if(head.x===snake[i].x && head.y===snake[i].y){
        return normalDeath();
      }
    }

    bombs.forEach((b,i)=>{
      if(head.x===b.x && head.y===b.y){
        boom();
        return bombDeath();
      }
    });

    if(time - bombTimer > 2500){
      spawnBomb();
      bombTimer = time;
    }
  }

  drawSnake();

  ctx.fillStyle="lime";
  ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

  bombs.forEach((b,i)=>{
    drawBomb(b);
    b.life -= 16;
    if(b.life<=0) bombs.splice(i,1);
  });

  // score
  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.fillText("Score: "+score+" | High: "+high,20,30);

  if(score>high){
    high=score;
    localStorage.setItem("high",high);
  }

  requestAnimationFrame(loop);
}

// deaths
function normalDeath(){
  running=false;
  document.getElementById("gameOver").style.display="flex";
}

function bombDeath(){
  running=false;
  document.getElementById("bombDeath").style.display="flex";
}

// controls
function startGame(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  document.getElementById("startScreen").style.display="none";
  init();
  running=true;
  requestAnimationFrame(loop);
}

function restart(){
  document.getElementById("gameOver").style.display="none";
  document.getElementById("bombDeath").style.display="none";
  document.getElementById("startScreen").style.display="flex";
}
</script>

</body>
</html>
