<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conz Snake</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

canvas {
  display: block;
  touch-action: none;
}

/* CENTER FIX */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  color: red;
  background: black;
}

#gameOver, #bombDeath { display:none; }

button {
  padding: 12px 25px;
  border: 2px solid red;
  background: black;
  color: white;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1 style="text-align:center;">WELCOME TO CONZ SNAKE</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver" class="screen">
  <h1>💀 YOU DIED 💀</h1>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<div id="bombDeath" class="screen">
  <h1>💣 BOOM 💣</h1>
  <p>Seriously... you didn't see that? 🤡</p>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let grid = 25, cols, rows;

let snake, dir, food, bombs;
let score = 0, high = localStorage.getItem("high") || 0;

let running = false;
let lastMove = 0;
let bombTimer = 0;
let speed = 120;

// 🎵 MUSIC
let audioCtx, musicOsc;

// ✖️ MULTIPLIER SYSTEM
let multActive = false;
let multiplier = 1;
let multTimer = 0;
let multDot = null;
let multDotTimer = 0;

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / grid);
  rows = Math.floor(canvas.height / grid);
}
resize();
window.addEventListener("resize", resize);

// sounds
function chomp(){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.type="triangle";
  o.frequency.setValueAtTime(400,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+0.15);
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
  o.stop(audioCtx.currentTime+0.2);
}

function boom(){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.type="sawtooth";
  o.frequency.setValueAtTime(100,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(40,audioCtx.currentTime+0.3);
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
  o.stop(audioCtx.currentTime+0.3);
}

// 🎵 MUSIC LOOP
function startMusic(){
  musicOsc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  musicOsc.type = "sine";
  musicOsc.frequency.value = 120;

  musicOsc.connect(gain);
  gain.connect(audioCtx.destination);

  gain.gain.value = 0.03;

  musicOsc.start();
}

// init
function init(){
  let cx = Math.floor(cols/2);
  let cy = Math.floor(rows/2);

  snake = [
    {x:cx,y:cy},
    {x:cx-1,y:cy},
    {x:cx-2,y:cy}
  ];

  dir = {x:1,y:0};
  food = spawnFood();
  bombs = [];
  score = 0;

  multActive = false;
  multiplier = 1;
  multDot = null;
}

// food
function spawnFood(){
  return {
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows)
  };
}

// bomb
function spawnBomb(){
  bombs.push({
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows),
    life: 2000
  });
}

// ✖️ MULT DOT
function spawnMultDot(){
  multDot = {
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows),
    value: Math.floor(Math.random()*4)+2 // x2–x5
  };
  multDotTimer = 3000;
}

// swipe
let sx=0, sy=0;
canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0 && dir.x!==-1) dir={x:1,y:0};
    else if(dx<0 && dir.x!==1) dir={x:-1,y:0};
  } else {
    if(dy>0 && dir.y!==-1) dir={x:0,y:1};
    else if(dy<0 && dir.y!==1) dir={x:0,y:-1};
  }
});

// loop
function loop(time){
  if(!running) return;

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(time - lastMove > speed){
    lastMove = time;

    let head = {
      x: snake[0].x + dir.x,
      y: snake[0].y + dir.y
    };

    snake.unshift(head);

    // FOOD
    if(head.x===food.x && head.y===food.y){
      score += multiplier;
      chomp();
      food = spawnFood();
    } else {
      snake.pop();
    }

    // WALL / SELF
    if(head.x<0||head.y<0||head.x>=cols||head.y>=rows) return normalDeath();
    for(let i=1;i<snake.length;i++){
      if(head.x===snake[i].x && head.y===snake[i].y) return normalDeath();
    }

    // BOMB
    bombs.forEach((b)=>{
      if(head.x===b.x && head.y===b.y){
        boom();
        return bombDeath();
      }
    });

    // MULT DOT
    if(multDot && head.x===multDot.x && head.y===multDot.y){
      multiplier = multDot.value;
      multActive = true;
      multTimer = 15000;
      multDot = null;
    }

    if(time - bombTimer > 2500){
      spawnBomb();
      bombTimer = time;
    }

    // spawn multiplier randomly
    if(!multDot && Math.random()<0.01){
      spawnMultDot();
    }
  }

  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? "#00ffcc" : "#00aa66";
    ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
  });

  // food
  ctx.fillStyle="lime";
  ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

  // bombs
  bombs.forEach((b,i)=>{
    ctx.fillStyle="red";
    ctx.fillRect(b.x*grid,b.y*grid,grid,grid);
    b.life-=16;
    if(b.life<=0) bombs.splice(i,1);
  });

  // ✖️ MULT DOT DRAW
  if(multDot){
    ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
    ctx.fillRect(multDot.x*grid, multDot.y*grid, grid, grid);
    multDotTimer -= 16;
    if(multDotTimer<=0) multDot=null;
  }

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Score: "+score+" | High: "+high,20,30);

  if(multActive){
    ctx.fillText("x"+multiplier+" ("+Math.ceil(multTimer/1000)+")",20,55);
    multTimer -= 16;
    if(multTimer<=0){
      multActive=false;
      multiplier=1;
    }
  }

  if(score>high){
    high=score;
    localStorage.setItem("high",high);
  }

  requestAnimationFrame(loop);
}

// deaths
function normalDeath(){
  running=false;
  document.getElementById("gameOver").style.display="flex";
}

function bombDeath(){
  running=false;
  document.getElementById("bombDeath").style.display="flex";
}

// controls
function startGame(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  startMusic();

  document.getElementById("startScreen").style.display="none";
  init();
  running=true;
  requestAnimationFrame(loop);
}

function restart(){
  document.getElementById("gameOver").style.display="none";
  document.getElementById("bombDeath").style.display="none";
  document.getElementById("startScreen").style.display="flex";
}
</script>

</body>
</html>
