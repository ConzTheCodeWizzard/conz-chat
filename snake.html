<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONZ SNAKE 🔥</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
  touch-action: none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const grid = 25;

let snake = [{x:10,y:10}];
let dir = {x:1,y:0};

let food = spawnFood();
let score = 0;
let high = localStorage.getItem("high") || 0;

let enemies = [];
let particles = [];

function spawnFood(){
  return {
    x: Math.floor(Math.random()* (canvas.width/grid)),
    y: Math.floor(Math.random()* (canvas.height/grid))
  }
}

function spawnEnemy(){
  enemies.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.floor(Math.random()*3)+1,
    bites: 0,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2
  });
}

setInterval(spawnEnemy, 3000);

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp" && dir.y!==1) dir={x:0,y:-1};
  if(e.key==="ArrowDown" && dir.y!==-1) dir={x:0,y:1};
  if(e.key==="ArrowLeft" && dir.x!==1) dir={x:-1,y:0};
  if(e.key==="ArrowRight" && dir.x!==-1) dir={x:1,y:0};
});

// swipe
let startX=0,startY=0;
canvas.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
},{passive:false});

canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0 && dir.x!==-1) dir={x:1,y:0};
    else if(dx<0 && dir.x!==1) dir={x:-1,y:0};
  }else{
    if(dy>0 && dir.y!==-1) dir={x:0,y:1};
    else if(dy<0 && dir.y!==1) dir={x:0,y:-1};
  }
});

function drawLeaf(x,y){
  ctx.fillStyle="lime";
  ctx.beginPath();
  ctx.moveTo(x,y+grid/2);
  ctx.quadraticCurveTo(x+grid/2,y-10,x+grid,y+grid/2);
  ctx.quadraticCurveTo(x+grid/2,y+grid+10,x,y+grid/2);
  ctx.fill();
}

function game(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  snake.unshift(head);

  // eat
  if(head.x===food.x && head.y===food.y){
    score++;
    food = spawnFood();

    for(let i=0;i<15;i++){
      particles.push({
        x:head.x*grid,
        y:head.y*grid,
        vx:(Math.random()-0.5)*4,
        vy:(Math.random()-0.5)*4,
        life:20
      });
    }
  }else{
    snake.pop();
  }

  // enemies
  enemies.forEach((e,i)=>{
    e.x += e.vx;
    e.y += e.vy;

    // bounce
    if(e.x<0||e.x>canvas.width) e.vx*=-1;
    if(e.y<0||e.y>canvas.height) e.vy*=-1;

    // collision with player
    let hx = head.x*grid;
    let hy = head.y*grid;

    if(Math.abs(e.x-hx)<20 && Math.abs(e.y-hy)<20){
      if(e.bites < 3){
        e.bites++;

        let damage = e.size;
        snake.splice(-damage);
        score -= damage;

        if(score<0) score=0;

        if(snake.length<=0){
          alert("GAME OVER");
          location.reload();
        }
      }

      if(e.bites>=3){
        enemies.splice(i,1);
      }
    }

    // draw enemy
    ctx.shadowBlur=20;
    ctx.shadowColor="red";
    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,15+e.size*5,15+e.size*5);
  });

  // draw snake
  snake.forEach((s,i)=>{
    ctx.shadowBlur=15;
    ctx.shadowColor="lime";
    ctx.fillStyle=i===0?"#00ffcc":"#00aa66";
    ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
  });

  // food
  drawLeaf(food.x*grid,food.y*grid);

  // particles
  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;

    ctx.fillStyle="lime";
    ctx.fillRect(p.x,p.y,3,3);

    if(p.life<=0) particles.splice(i,1);
  });

  // score
  if(score>high){
    high=score;
    localStorage.setItem("high",high);
  }

  ctx.shadowBlur=0;
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Score: "+score+"  High: "+high,20,30);

  requestAnimationFrame(game);
}

game();
</script>

</body>
</html>
