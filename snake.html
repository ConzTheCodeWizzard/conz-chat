<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conz Snake</title>

<style>
html,body{margin:0;overflow:hidden;background:black;font-family:Arial;}
canvas{display:block;}

.screen{
 position:fixed;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 background:black;
 color:red;
}

.menu{display:none;}

button{
 padding:10px 20px;
 margin:5px;
 border:2px solid red;
 background:black;
 color:white;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>CONZ SNAKE</h1>
  <button onclick="startGame()">START</button>
  <button onclick="openSettings()">SETTINGS</button>
  <button onclick="openMods()">MOD MENU</button>
</div>

<div id="settings" class="screen menu">
  <h2>SETTINGS</h2>

  <button onclick="toggleMusic()">Music ON/OFF</button>
  <button onclick="cycleColor()">Snake Colour</button>
  <button onclick="toggleBombs()">Bombs ON/OFF</button>

  <button onclick="closeMenus()">BACK</button>
</div>

<div id="mods" class="screen menu">
  <h2>MOD MENU</h2>

  <button onclick="toggleNoClip()">No Clip</button>
  <button onclick="toggleX5()">Always x5</button>
  <button onclick="toggleGod()">Never Die</button>

  <button onclick="closeMenus()">BACK</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let grid=25,cols,rows;
let snake,dir,food,bombs;
let running=false;

let score=0;
let multiplier=1;

// SETTINGS
let musicOn=true;
let bombsOn=true;
let snakeColors=["green","purple","red","rainbow"];
let colorIndex=0;

// MODS
let noClip=false;
let alwaysX5=false;
let godMode=false;

// resize
function resize(){
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
 cols=Math.floor(canvas.width/grid);
 rows=Math.floor(canvas.height/grid);
}
resize();
window.addEventListener("resize",resize);

// init
function init(){
 let cx=Math.floor(cols/2);
 let cy=Math.floor(rows/2);

 snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
 dir={x:1,y:0};

 food=spawn();
 bombs=[];
 score=0;
}

// spawn
function spawn(){
 return{
  x:Math.floor(Math.random()*cols),
  y:Math.floor(Math.random()*rows)
 };
}

// controls
let sx=0,sy=0;
canvas.addEventListener("touchstart",e=>{
 sx=e.touches[0].clientX;
 sy=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-sx;
 let dy=e.changedTouches[0].clientY-sy;

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>0&&dir.x!==-1) dir={x:1,y:0};
  else if(dx<0&&dir.x!==1) dir={x:-1,y:0};
 }else{
  if(dy>0&&dir.y!==-1) dir={x:0,y:1};
  else if(dy<0&&dir.y!==1) dir={x:0,y:-1};
 }
});

// loop
function loop(){
 if(!running) return;

 let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

 // NO CLIP
 if(noClip){
  if(head.x<0) head.x=cols-1;
  if(head.x>=cols) head.x=0;
  if(head.y<0) head.y=rows-1;
  if(head.y>=rows) head.y=0;
 }

 snake.unshift(head);

 // food
 if(head.x===food.x&&head.y===food.y){
  score += alwaysX5 ? 5 : multiplier;
  food=spawn();
 }else snake.pop();

 // death
 if(!godMode){
  if(head.x<0||head.y<0||head.x>=cols||head.y>=rows) return stop();
  for(let i=1;i<snake.length;i++){
   if(head.x===snake[i].x&&head.y===snake[i].y) return stop();
  }
 }

 // bombs
 if(bombsOn){
  bombs.forEach((b)=>{
   if(head.x===b.x&&head.y===b.y && !godMode){
    return stop();
   }
  });
 }

 // draw
 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // snake color
 snake.forEach((s,i)=>{
  if(snakeColors[colorIndex]==="rainbow"){
   ctx.fillStyle=`hsl(${(i*30+Date.now()/10)%360},100%,50%)`;
  }else{
   ctx.fillStyle=snakeColors[colorIndex];
  }
  ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
 });

 // food
 ctx.fillStyle="lime";
 ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

 // bombs
 if(bombsOn){
  if(Math.random()<0.02){
   bombs.push({...spawn()});
  }

  bombs.forEach((b)=>{
   ctx.fillStyle="red";
   ctx.fillRect(b.x*grid,b.y*grid,grid,grid);
  });
 }

 ctx.fillStyle="white";
 ctx.fillText("Score: "+score,20,30);

 requestAnimationFrame(loop);
}

// start
function startGame(){
 closeMenus();
 init();
 running=true;
 loop();
}

function stop(){
 running=false;
 alert("Game Over");
}

// menus
function openSettings(){
 document.getElementById("startScreen").style.display="none";
 document.getElementById("settings").style.display="flex";
}

function openMods(){
 document.getElementById("startScreen").style.display="none";
 document.getElementById("mods").style.display="flex";
}

function closeMenus(){
 document.getElementById("settings").style.display="none";
 document.getElementById("mods").style.display="none";
 document.getElementById("startScreen").style.display="flex";
}

// toggles
function toggleMusic(){ musicOn=!musicOn; }
function toggleBombs(){ bombsOn=!bombsOn; }
function cycleColor(){ colorIndex=(colorIndex+1)%snakeColors.length; }

function toggleNoClip(){ noClip=!noClip; }
function toggleX5(){ alwaysX5=!alwaysX5; }
function toggleGod(){ godMode=!godMode; }

</script>
</body>
</html>
