<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conz Snake 💣</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

canvas {
  display: block;
  touch-action: none;
}

.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  z-index: 100;
}

#gameOver, #bombDeath {
  display: none;
}

button {
  padding: 12px 25px;
  border: 2px solid red;
  background: black;
  color: white;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>WELCOME TO CONZ SNAKE</h1>
  <p>(developed by conz)</p>
  <h2>GOOD LUCK!</h2>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver" class="screen">
  <h1>💀 YOU DIED 💀</h1>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<div id="bombDeath" class="screen">
  <h1>💣 BOOM 💣</h1>
  <p>Seriously... you didn't see that giant bomb? 🤡</p>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// sounds
const boom = new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");

// grid
let grid = 25;
let cols, rows;

// game state
let snake, dir, food, bombs;
let score = 0, high = localStorage.getItem("high") || 0;
let running = false;
let lastMove = 0;
let bombTimer = 0;
let speed = 120;

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / grid);
  rows = Math.floor(canvas.height / grid);
}
resize();
window.addEventListener("resize", resize);

// init
function init(){
  let cx = Math.floor(cols/2);
  let cy = Math.floor(rows/2);

  snake = [
    {x:cx,y:cy},
    {x:cx-1,y:cy},
    {x:cx-2,y:cy}
  ];

  dir = {x:1,y:0};

  food = spawnFood();
  bombs = [];
  score = 0;
}

// food
function spawnFood(){
  return {
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows)
  };
}

// bomb
function spawnBomb(){
  bombs.push({
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows),
    life: 2000 // milliseconds
  });
}

// swipe
let sx=0, sy=0;

canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});

canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0 && dir.x!==-1) dir={x:1,y:0};
    else if(dx<0 && dir.x!==1) dir={x:-1,y:0};
  } else {
    if(dy>0 && dir.y!==-1) dir={x:0,y:1};
    else if(dy<0 && dir.y!==1) dir={x:0,y:-1};
  }
});

// loop
function loop(time){
  if(!running) return;

  // background effect
  let hue = (score * 5) % 360;
  ctx.fillStyle = `hsl(${hue}, 40%, 5%)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(time - lastMove > speed){
    lastMove = time;

    let head = {
      x: snake[0].x + dir.x,
      y: snake[0].y + dir.y
    };

    snake.unshift(head);

    // food
    if(head.x === food.x && head.y === food.y){
      score++;
      food = spawnFood();

      if(score % 5 === 0 && speed > 60) speed -= 5;

    } else {
      snake.pop();
    }

    // wall
    if(head.x<0 || head.y<0 || head.x>=cols || head.y>=rows){
      return normalDeath();
    }

    // self
    for(let i=1;i<snake.length;i++){
      if(head.x===snake[i].x && head.y===snake[i].y){
        return normalDeath();
      }
    }

    // bombs
    bombs.forEach((b,i)=>{
      if(head.x===b.x && head.y===b.y){
        boom.play();
        return bombDeath();
      }
    });

    // spawn bombs
    if(time - bombTimer > 2500){
      spawnBomb();
      bombTimer = time;
    }
  }

  // draw snake
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? "#00ffcc" : "#00aa66";
    ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
  });

  // food
  ctx.fillStyle="lime";
  ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

  // bombs
  bombs.forEach((b,i)=>{
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(b.x*grid+12, b.y*grid+12, 10, 0, Math.PI*2);
    ctx.fill();

    b.life -= 16;
    if(b.life <= 0) bombs.splice(i,1);
  });

  // score
  ctx.fillStyle="white";
  ctx.fillText("Score: "+score+" | High: "+high,20,30);

  if(score>high){
    high=score;
    localStorage.setItem("high",high);
  }

  requestAnimationFrame(loop);
}

// deaths
function normalDeath(){
  running=false;
  document.getElementById("gameOver").style.display="flex";
}

function bombDeath(){
  running=false;
  document.getElementById("bombDeath").style.display="flex";
}

// controls
function startGame(){
  document.getElementById("startScreen").style.display="none";
  init();
  running=true;
  lastMove=0;
  bombTimer=0;
  requestAnimationFrame(loop);
}

function restart(){
  document.getElementById("gameOver").style.display="none";
  document.getElementById("bombDeath").style.display="none";
  document.getElementById("startScreen").style.display="flex";
}
</script>

</body>
</html>
