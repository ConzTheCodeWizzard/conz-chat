<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONZ SNAKE INSANE 🔥</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

canvas {
  display: block;
  touch-action: none;
}

.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  z-index: 100;
}

#gameOver, #bombDeath { display:none; }

button {
  padding: 12px 25px;
  border: 2px solid red;
  background: black;
  color: white;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>WELCOME TO CONZ SNAKE</h1>
  <p>(developed by conz)</p>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver" class="screen">
  <h1>💀 YOU DIED 💀</h1>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<div id="bombDeath" class="screen">
  <h1>💣 BOOM 💣</h1>
  <p>Seriously... you didn't see that? 🤡</p>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let grid = 25;
let cols, rows;

let snake, dir, food, bombs;
let running = false;
let lastMove = 0;
let bombTimer = 0;
let speed = 120;

let shake = 0;
let hue = 0;
let audioCtx;

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / grid);
  rows = Math.floor(canvas.height / grid);
}
resize();
window.addEventListener("resize", resize);

// sound
function beep(freq, dur){
  if(!audioCtx) return;
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.frequency.value = freq;
  o.type = "square";
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);
}

// init
function init(){
  let cx = Math.floor(cols/2);
  let cy = Math.floor(rows/2);

  snake = [
    {x:cx,y:cy},
    {x:cx-1,y:cy},
    {x:cx-2,y:cy}
  ];

  dir = {x:1,y:0};
  food = spawnFood();
  bombs = [];
}

// food
function spawnFood(){
  return {
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows)
  };
}

// bomb
function spawnBomb(){
  bombs.push({
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows),
    life: 2000
  });
}

// swipe
let sx=0, sy=0;
canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0 && dir.x!==-1) dir={x:1,y:0};
    else if(dx<0 && dir.x!==1) dir={x:-1,y:0};
  } else {
    if(dy>0 && dir.y!==-1) dir={x:0,y:1};
    else if(dy<0 && dir.y!==1) dir={x:0,y:-1};
  }
});

// draw snake glow + trail
function drawSnake(){
  snake.forEach((s,i)=>{
    ctx.shadowBlur = 20;
    ctx.shadowColor = "lime";
    ctx.fillStyle = i===0 ? "#00ffcc" : "#00aa66";
    ctx.fillRect(s.x*grid, s.y*grid, grid, grid);
  });

  ctx.shadowBlur = 0;

  // tongue flick
  if(Math.random()<0.1){
    let head = snake[0];
    ctx.fillStyle="red";
    ctx.fillRect(head.x*grid+10, head.y*grid-5, 3,5);
  }
}

// bomb visual
function drawBomb(b){
  let x = b.x*grid+12;
  let y = b.y*grid+12;

  let pulse = Math.sin(Date.now()/100)*2;

  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.arc(x,y,10+pulse,0,Math.PI*2);
  ctx.fill();

  // flashing warning
  if(b.life < 800){
    ctx.strokeStyle="red";
    ctx.beginPath();
    ctx.arc(x,y,14+pulse,0,Math.PI*2);
    ctx.stroke();
  }

  // fuse spark
  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(x,y-15,3,0,Math.PI*2);
  ctx.fill();
}

// loop
function loop(time){
  if(!running) return;

  // 🌈 animated background
  hue += 0.5;
  ctx.fillStyle = `hsl(${hue}, 30%, 5%)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 💥 screen shake
  if(shake > 0){
    shake--;
    ctx.translate(Math.random()*10-5, Math.random()*10-5);
  }

  if(time - lastMove > speed){
    lastMove = time;

    let head = {
      x: snake[0].x + dir.x,
      y: snake[0].y + dir.y
    };

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
      beep(700,0.1);
      food = spawnFood();
    } else {
      snake.pop();
    }

    // wall/self
    if(head.x<0||head.y<0||head.x>=cols||head.y>=rows){
      return normalDeath();
    }
    for(let i=1;i<snake.length;i++){
      if(head.x===snake[i].x && head.y===snake[i].y){
        return normalDeath();
      }
    }

    // bombs
    bombs.forEach((b,i)=>{
      if(head.x===b.x && head.y===b.y){
        beep(80,0.5);
        shake = 15;
        return bombDeath();
      }
    });

    // spawn bombs
    if(time - bombTimer > 2000){
      spawnBomb();
      bombTimer = time;
    }
  }

  drawSnake();

  // food
  ctx.fillStyle="lime";
  ctx.fillRect(food.x*grid, food.y*grid, grid, grid);

  // bombs
  bombs.forEach((b,i)=>{
    drawBomb(b);
    b.life -= 16;
    if(b.life<=0) bombs.splice(i,1);
  });

  requestAnimationFrame(loop);
}

// deaths
function normalDeath(){
  running=false;
  document.getElementById("gameOver").style.display="flex";
}

function bombDeath(){
  running=false;
  document.getElementById("bombDeath").style.display="flex";
}

// controls
function startGame(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  document.getElementById("startScreen").style.display="none";
  init();
  running=true;
  lastMove=0;
  requestAnimationFrame(loop);
}

function restart(){
  document.getElementById("gameOver").style.display="none";
  document.getElementById("bombDeath").style.display="none";
  document.getElementById("startScreen").style.display="flex";
}
</script>

</body>
</html>
