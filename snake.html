<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conz Snake</title>

<style>
html,body{margin:0;overflow:hidden;background:black;font-family:Arial;}
canvas{display:block;}

.screen{
 position:fixed;width:100%;height:100%;
 display:flex;justify-content:center;align-items:center;
 flex-direction:column;background:black;color:red;
 text-align:center;z-index:10;
}

.hidden{display:none;}

button{
 padding:10px 20px;margin:6px;
 border:2px solid red;background:black;color:white;
}

#ui{
 position:fixed;top:10px;left:10px;color:white;
}
#modBtn{
 position:fixed;bottom:20px;right:20px;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>WELCOME TO CONZ SNAKE</h1>
  <button onclick="startGame()">START</button>
  <button onclick="showSettings()">SETTINGS</button>
  <button onclick="showMods()">MOD MENU</button>
</div>

<div id="settings" class="screen hidden">
  <h2>SETTINGS</h2>
  <button onclick="toggleMusic()">Music: <span id="musicState">ON</span></button>
  <button onclick="back()">BACK</button>
</div>

<div id="mods" class="screen hidden">
  <h2>MOD MENU</h2>
  <button onclick="toggleNoClip()">No Clip: <span id="noclipState">OFF</span></button>
  <button onclick="toggleX5()">Always x5: <span id="x5State">OFF</span></button>
  <button onclick="toggleGod()">Never Die: <span id="godState">OFF</span></button>
  <button onclick="resume()">RESUME</button>
  <button onclick="back()">MENU</button>
</div>

<div id="gameOver" class="screen hidden">
  <h1>💀 YOU DIED 💀</h1>
  <button onclick="back()">MENU</button>
</div>

<div id="ui"></div>
<button id="modBtn" onclick="openModsInGame()">MODS</button>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let grid=25,cols,rows;
let snake,dir,food,bombs=[],mults=[];
let running=false,started=false;

let score=0,high=localStorage.getItem("high")||0;

let lastStep=0,stepDelay=120;

// mods
let noClip=false,alwaysX5=false,godMode=false;

// multiplier
let mult=1,multTimer=0;

// audio
let audioCtx, musicInt;

// resize
function resize(){
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
 cols=Math.floor(canvas.width/grid);
 rows=Math.floor(canvas.height/grid);
}
resize();
window.addEventListener("resize",resize);

// init
function init(){
 let cx=Math.floor(cols/2),cy=Math.floor(rows/2);
 snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
 dir={x:1,y:0};
 food=spawnSafe();
 bombs=[]; mults=[];
 score=0; mult=1; multTimer=0;
 started=false;
}

// safe spawn
function spawnSafe(){
 let pos;
 do{
  pos={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)};
 }while(
  snake.some(s=>s.x===pos.x&&s.y===pos.y) ||
  bombs.some(b=>b.x===pos.x&&b.y===pos.y) ||
  mults.some(m=>m.x===pos.x&&m.y===pos.y)
 );
 return pos;
}

// swipe
let sx=0,sy=0;
canvas.addEventListener("touchstart",e=>{
 sx=e.touches[0].clientX; sy=e.touches[0].clientY;
});
canvas.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-sx;
 let dy=e.changedTouches[0].clientY-sy;

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>0&&dir.x!==-1){dir={x:1,y:0};started=true;}
  else if(dx<0&&dir.x!==1){dir={x:-1,y:0};started=true;}
 }else{
  if(dy>0&&dir.y!==-1){dir={x:0,y:1};started=true;}
  else if(dy<0&&dir.y!==1){dir={x:0,y:-1};started=true;}
 }
});

// sound
function beep(f){
 if(!audioCtx) return;
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.frequency.value=f;
 o.connect(g); g.connect(audioCtx.destination);
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
 o.stop(audioCtx.currentTime+0.2);
}

// music
function startMusic(){
 musicInt=setInterval(()=>beep(120),700);
}
function stopMusic(){clearInterval(musicInt);}

// loop
function loop(time){
 if(!running) return;

 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 if(started && time-lastStep>stepDelay){
  lastStep=time;

  let next={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  // no clip
  if(noClip){
   if(next.x<0) next.x=cols-1;
   if(next.x>=cols) next.x=0;
   if(next.y<0) next.y=rows-1;
   if(next.y>=rows) next.y=0;
  }

  // NEVER DIE FIX
  if(godMode && !noClip){
   if(next.x<0||next.y<0||next.x>=cols||next.y>=rows){
    next = {...snake[0]}; // stay in place
   }
  }

  snake.unshift(next);

  // eat
  if(next.x===food.x&&next.y===food.y){
   score+=alwaysX5?5:mult;
   beep(600);
   food=spawnSafe();
  }else snake.pop();

  // bombs
  bombs.forEach((b,i)=>{
   if(next.x===b.x&&next.y===b.y&&!godMode){
    return gameOver();
   }
   b.life-=16;
   if(b.life<=0) bombs.splice(i,1);
  });

  // mults
  mults.forEach((m,i)=>{
   if(next.x===m.x&&next.y===m.y){
    mult=m.value;
    multTimer=15000;
    beep(1000);
    mults.splice(i,1);
   }
   m.life-=16;
   if(m.life<=0) mults.splice(i,1);
  });

  // death
  if(!godMode){
   if(next.x<0||next.y<0||next.x>=cols||next.y>=rows) return gameOver();
   for(let i=1;i<snake.length;i++){
    if(next.x===snake[i].x&&next.y===snake[i].y) return gameOver();
   }
  }

  // spawn
  if(Math.random()<0.006) bombs.push({...spawnSafe(),life:2000});
  if(Math.random()<0.003) mults.push({...spawnSafe(),value:2+Math.floor(Math.random()*4),life:3000});
 }

 // draw snake
 snake.forEach((s,i)=>{
  ctx.fillStyle=i===0?"#00ffcc":"green";
  ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
 });

 // food
 ctx.fillStyle="lime";
 ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

 // bombs
 bombs.forEach(b=>{
  ctx.fillStyle="red";
  ctx.fillRect(b.x*grid,b.y*grid,grid,grid);
 });

 // mults
 mults.forEach(m=>{
  ctx.fillStyle=`hsl(${Date.now()%360},100%,50%)`;
  ctx.fillRect(m.x*grid,m.y*grid,grid,grid);
 });

 // UI
 let txt=`Score:${score} High:${high}`;
 if(mult>1) txt+=` | x${mult} (${Math.ceil(multTimer/1000)})`;
 if(alwaysX5) txt+=" | INF x5";
 document.getElementById("ui").innerText=txt;

 if(multTimer>0){
  multTimer-=16;
  if(multTimer<=0) mult=1;
 }

 if(score>high){
  high=score;
  localStorage.setItem("high",high);
 }

 requestAnimationFrame(loop);
}

// controls
function startGame(){
 hideAll();
 audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 startMusic();
 init();
 running=true;
 requestAnimationFrame(loop);
}

function gameOver(){
 running=false;
 stopMusic();
 document.getElementById("gameOver").classList.remove("hidden");
}

// menus
function hideAll(){document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));}
function showSettings(){hideAll();document.getElementById("settings").classList.remove("hidden");}
function showMods(){hideAll();document.getElementById("mods").classList.remove("hidden");}
function openModsInGame(){running=false;document.getElementById("mods").classList.remove("hidden");}
function resume(){hideAll();running=true;requestAnimationFrame(loop);}
function back(){hideAll();document.getElementById("startScreen").classList.remove("hidden");}

// toggles
function toggleMusic(){
 musicInt?stopMusic():startMusic();
}
function toggleNoClip(){
 noClip=!noClip;
 document.getElementById("noclipState").innerText=noClip?"ON":"OFF";
}
function toggleX5(){
 alwaysX5=!alwaysX5;
 document.getElementById("x5State").innerText=alwaysX5?"ON":"OFF";
}
function toggleGod(){
 godMode=!godMode;
 document.getElementById("godState").innerText=godMode?"ON":"OFF";
}
</script>

</body>
</html>
