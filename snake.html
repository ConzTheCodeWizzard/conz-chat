<!DOCTYPE html>
<html>
<head>
<title>Conz Snake 🐍</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #000000, #1a0000, #330000);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

h1 {
  color: red;
  text-shadow: 0 0 10px red;
}

canvas {
  background: #111;
  border: 2px solid red;
  box-shadow: 0 0 20px red;
  touch-action: none; /* IMPORTANT */
}

#score {
  margin-top: 10px;
  font-size: 18px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: black;
  color: white;
  border: 2px solid red;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>CONZ SNAKE 🐍</h1>
<canvas id="game" width="400" height="400"></canvas>
<div id="score">Score: 0 | High: 0</div>
<button onclick="restartGame()">Restart</button>

<audio id="eatSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="gameOverSound" src="https://assets.mixkit.co/active_storage/sfx/2698/2698-preview.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
let snake, direction, food, score, highScore, game;

const eatSound = document.getElementById("eatSound");
const gameOverSound = document.getElementById("gameOverSound");

function init() {
  snake = [{ x: 10 * box, y: 10 * box }];
  direction = "RIGHT";
  score = 0;
  highScore = localStorage.getItem("highScore") || 0;

  food = {
    x: Math.floor(Math.random() * 20) * box,
    y: Math.floor(Math.random() * 20) * box
  };
}

function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, 400, 400);

  // snake
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? "lime" : "green";
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }

  // food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);

  let head = { ...snake[0] };

  if (direction === "LEFT") head.x -= box;
  if (direction === "RIGHT") head.x += box;
  if (direction === "UP") head.y -= box;
  if (direction === "DOWN") head.y += box;

  // collision
  if (
    head.x < 0 ||
    head.y < 0 ||
    head.x >= 400 ||
    head.y >= 400 ||
    hitSelf(head)
  ) {
    clearInterval(game);
    gameOverSound.play();
    alert("Game Over 😭 Score: " + score);
    return;
  }

  // food
  if (head.x === food.x && head.y === food.y) {
    score++;
    eatSound.play();

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
    }

    food = {
      x: Math.floor(Math.random() * 20) * box,
      y: Math.floor(Math.random() * 20) * box
    };
  } else {
    snake.pop();
  }

  snake.unshift(head);

  document.getElementById("score").innerText =
    "Score: " + score + " | High: " + highScore;
}

function hitSelf(head) {
  for (let i = 1; i < snake.length; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) {
      return true;
    }
  }
  return false;
}

// keyboard
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
  if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
});

// swipe (FIXED)
let startX = 0;
let startY = 0;

canvas.addEventListener("touchstart", (e) => {
  const t = e.touches[0];
  startX = t.clientX;
  startY = t.clientY;
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();

  const t = e.touches[0];
  const dx = t.clientX - startX;
  const dy = t.clientY - startY;

  if (Math.abs(dx) > 25 || Math.abs(dy) > 25) {

    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0 && direction !== "LEFT") direction = "RIGHT";
      else if (dx < 0 && direction !== "RIGHT") direction = "LEFT";
    } else {
      if (dy > 0 && direction !== "UP") direction = "DOWN";
      else if (dy < 0 && direction !== "DOWN") direction = "UP";
    }

    startX = t.clientX;
    startY = t.clientY;
  }
}, { passive: false });

function restartGame() {
  clearInterval(game);
  init();
  game = setInterval(draw, 120);
}

// start
init();
game = setInterval(draw, 120);
</script>

</body>
</html>
