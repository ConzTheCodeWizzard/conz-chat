<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conz Snake</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

canvas {
  display: block;
  touch-action: none;
}

#startScreen, #gameOver {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  z-index: 100;
}

#gameOver { display: none; }

button {
  padding: 12px 25px;
  border: 2px solid red;
  background: black;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="startScreen">
  <h1>WELCOME TO CONZ SNAKE</h1>
  <p>(developed by conz)</p>
  <h2>GOOD LUCK!</h2>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver">
  <h1>💀 OH NO YOU DIED 💀</h1>
  <p>BETTER LUCK NEXT TIME BRO 🥷👊</p>
  <button onclick="restart()">TRY AGAIN</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let grid = 25;
let cols, rows;

let snake, dir, food, enemies;
let score, high;

let running = false;
let lastMove = 0;
let enemyTimer = 0;
let speed = 120;

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / grid);
  rows = Math.floor(canvas.height / grid);
}
resize();
window.addEventListener("resize", resize);

// init
function init(){
  const cx = Math.floor(cols/2);
  const cy = Math.floor(rows/2);

  snake = [
    {x:cx,y:cy},
    {x:cx-1,y:cy},
    {x:cx-2,y:cy}
  ];

  dir = {x:1,y:0};

  food = {
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows)
  };

  enemies = [];
  score = 0;
  high = localStorage.getItem("high") || 0;
}

// swipe
let sx=0, sy=0;

canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});

canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0 && dir.x!==-1) dir={x:1,y:0};
    else if(dx<0 && dir.x!==1) dir={x:-1,y:0};
  } else {
    if(dy>0 && dir.y!==-1) dir={x:0,y:1};
    else if(dy<0 && dir.y!==1) dir={x:0,y:-1};
  }
});

// spawn enemy
function spawnEnemy(){
  enemies.push({
    x: Math.floor(Math.random()*cols),
    y: Math.floor(Math.random()*rows),
    size: Math.floor(Math.random()*3)+1,
    bites: 0,
    dir: [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random()*4)]
  });
}

// loop
function loop(time){
  if(!running) return;

  // movement timing
  if(time - lastMove > speed){
    lastMove = time;

    let head = {
      x: snake[0].x + dir.x,
      y: snake[0].y + dir.y
    };

    snake.unshift(head);

    // food
    if(head.x === food.x && head.y === food.y){
      score++;
      food = {
        x: Math.floor(Math.random()*cols),
        y: Math.floor(Math.random()*rows)
      };
    } else {
      snake.pop();
    }

    // wall
    if(head.x<0 || head.y<0 || head.x>=cols || head.y>=rows){
      return gameOver();
    }

    // self
    for(let i=1;i<snake.length;i++){
      if(head.x===snake[i].x && head.y===snake[i].y){
        return gameOver();
      }
    }

    // enemy movement + collision
    enemies.forEach((e,i)=>{
      e.x += e.dir.x;
      e.y += e.dir.y;

      if(e.x<0 || e.y<0 || e.x>=cols || e.y>=rows){
        enemies.splice(i,1);
        return;
      }

      if(e.x === head.x && e.y === head.y){

        if(snake.length > e.size){
          score += e.size;
          snake.push({...snake[snake.length-1]});
          enemies.splice(i,1);
        } else {
          snake.splice(-e.size);
          score -= e.size;
          if(score < 0) score = 0;
          if(snake.length <= 0) return gameOver();
        }
      }
    });

    // spawn enemies every ~3 sec
    if(time - enemyTimer > 3000){
      spawnEnemy();
      enemyTimer = time;
    }
  }

  // draw
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? "lime" : "green";
    ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
  });

  // food
  ctx.fillStyle="red";
  ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

  // enemies
  enemies.forEach(e=>{
    ctx.fillStyle="orange";
    ctx.fillRect(e.x*grid,e.y*grid,grid,grid);
  });

  // score display (ALWAYS visible)
  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.fillText("Score: " + score + " | High: " + high, 20, 30);

  if(score > high){
    high = score;
    localStorage.setItem("high", high);
  }

  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById("startScreen").style.display = "none";
  init();
  running = true;
  lastMove = 0;
  enemyTimer = 0;
  requestAnimationFrame(loop);
}

function gameOver(){
  running = false;
  document.getElementById("gameOver").style.display = "flex";
}

function restart(){
  document.getElementById("gameOver").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
}
</script>

</body>
</html>
