<!DOCTYPE html>
<html>
<head>
<title>Conz Snake 🐍</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  touch-action: none;
  font-family: Arial;
}

/* FULLSCREEN */
canvas {
  display: block;
}

/* UI */
#ui {
  position: fixed;
  top: 10px;
  width: 100%;
  text-align: center;
  color: white;
}

h1 {
  margin: 0;
  color: red;
  text-shadow: 0 0 10px red;
}

#score {
  font-size: 16px;
}

/* CONTROLS */
#controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn {
  width: 60px;
  height: 60px;
  background: rgba(255,0,0,0.2);
  border: 1px solid red;
  color: white;
  font-size: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
  <h1>CONZ SNAKE 🐍</h1>
  <div id="score">Score: 0 | High: 0</div>
</div>

<div id="controls">
  <button class="btn" onclick="setDir('LEFT')">⬅️</button>
  <button class="btn" onclick="setDir('UP')">⬆️</button>
  <button class="btn" onclick="setDir('DOWN')">⬇️</button>
  <button class="btn" onclick="setDir('RIGHT')">➡️</button>
</div>

<audio id="eatSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="gameOverSound" src="https://assets.mixkit.co/active_storage/sfx/2698/2698-preview.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gridSize = 20;
let cols, rows;

let snake, direction, food, score, highScore, speed, game;

const eatSound = document.getElementById("eatSound");
const gameOverSound = document.getElementById("gameOverSound");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  cols = Math.floor(canvas.width / gridSize);
  rows = Math.floor(canvas.height / gridSize);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function init() {
  snake = [{ x: Math.floor(cols/2), y: Math.floor(rows/2) }];
  direction = "RIGHT";
  score = 0;
  speed = 120;

  highScore = localStorage.getItem("highScore") || 0;

  spawnFood();
}

function spawnFood() {
  food = {
    x: Math.floor(Math.random() * cols),
    y: Math.floor(Math.random() * rows)
  };
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // neon snake
  for (let i = 0; i < snake.length; i++) {
    ctx.shadowBlur = 15;
    ctx.shadowColor = "lime";
    ctx.fillStyle = i === 0 ? "#00ffcc" : "#00aa66";

    ctx.fillRect(
      snake[i].x * gridSize,
      snake[i].y * gridSize,
      gridSize,
      gridSize
    );
  }

  ctx.shadowBlur = 0;

  // food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

  let head = { ...snake[0] };

  if (direction === "LEFT") head.x--;
  if (direction === "RIGHT") head.x++;
  if (direction === "UP") head.y--;
  if (direction === "DOWN") head.y++;

  // collision
  if (
    head.x < 0 ||
    head.y < 0 ||
    head.x >= cols ||
    head.y >= rows ||
    hitSelf(head)
  ) {
    clearInterval(game);
    gameOverSound.play();
    alert("Game Over 😭 Score: " + score);
    return;
  }

  // eat
  if (head.x === food.x && head.y === food.y) {
    score++;
    eatSound.play();

    if (score % 5 === 0 && speed > 60) {
      speed -= 10; // speed up
      restartLoop();
    }

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
    }

    spawnFood();
  } else {
    snake.pop();
  }

  snake.unshift(head);

  document.getElementById("score").innerText =
    "Score: " + score + " | High: " + highScore;
}

function hitSelf(head) {
  for (let i = 1; i < snake.length; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) return true;
  }
  return false;
}

// keyboard
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") setDir("LEFT");
  if (e.key === "ArrowUp") setDir("UP");
  if (e.key === "ArrowRight") setDir("RIGHT");
  if (e.key === "ArrowDown") setDir("DOWN");
});

// buttons
function setDir(dir) {
  if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
  if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
  if (dir === "UP" && direction !== "DOWN") direction = "UP";
  if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
}

// swipe
let startX = 0;
let startY = 0;

canvas.addEventListener("touchstart", (e) => {
  const t = e.touches[0];
  startX = t.clientX;
  startY = t.clientY;
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();

  const t = e.touches[0];
  let dx = t.clientX - startX;
  let dy = t.clientY - startY;

  if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? "RIGHT" : "LEFT");
    } else {
      setDir(dy > 0 ? "DOWN" : "UP");
    }

    startX = t.clientX;
    startY = t.clientY;
  }
}, { passive: false });

function restartLoop() {
  clearInterval(game);
  game = setInterval(draw, speed);
}

// start
init();
game = setInterval(draw, speed);
</script>

</body>
</html>
