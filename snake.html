<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conz Snake Ultimate</title>

<style>
html,body{margin:0;overflow:hidden;background:black;font-family:Arial;}
canvas{display:block;}

button{
 position:fixed;
 bottom:20px;
 padding:10px;
 border:2px solid red;
 background:black;
 color:white;
 z-index:5;
}

#boost{left:20px;}
#menuBtn{right:20px;}

#ui{
 position:fixed;
 top:10px;
 left:10px;
 color:white;
}
</style>
</head>

<body>

<button id="boost">BOOST</button>
<button id="menuBtn">MODS</button>

<div id="ui"></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let grid=25,cols,rows;
let snake,dir,food,bombs=[],mults=[],particles=[];
let running=true,started=false;

let score=0,high=localStorage.getItem("high")||0;

let stepDelay=120,lastStep=0;

// mods
let noClip=false,godMode=false,alwaysX5=false;
let ghost=false,magnet=true,chaos=true;

// abilities
let boost=false,shield=false;

// multiplier
let mult=1,multTimer=0;

// resize
function resize(){
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
 cols=Math.floor(canvas.width/grid);
 rows=Math.floor(canvas.height/grid);
}
resize();
window.addEventListener("resize",resize);

// init
function init(){
 let cx=Math.floor(cols/2),cy=Math.floor(rows/2);
 snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
 dir={x:1,y:0};
 food=spawn();
 bombs=[]; mults=[]; particles=[];
 score=0; mult=1; multTimer=0;
}
init();

// spawn
function spawn(){
 return {x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)};
}

// swipe
let sx=0,sy=0;
canvas.addEventListener("touchstart",e=>{
 sx=e.touches[0].clientX; sy=e.touches[0].clientY;
});
canvas.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-sx;
 let dy=e.changedTouches[0].clientY-sy;

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>0&&dir.x!==-1){dir={x:1,y:0};started=true;}
  else if(dx<0&&dir.x!==1){dir={x:-1,y:0};started=true;}
 }else{
  if(dy>0&&dir.y!==-1){dir={x:0,y:1};started=true;}
  else if(dy<0&&dir.y!==1){dir={x:0,y:-1};started=true;}
 }
});

// boost button
document.getElementById("boost").onclick=()=>{
 boost=true;
 setTimeout(()=>boost=false,2000);
};

// loop
function loop(time){
 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 let speed=boost?60:120;

 if(started && time-lastStep>speed){
  lastStep=time;

  let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  // noclip
  if(noClip){
   if(head.x<0) head.x=cols-1;
   if(head.x>=cols) head.x=0;
   if(head.y<0) head.y=rows-1;
   if(head.y>=rows) head.y=0;
  }

  snake.unshift(head);

  // magnet
  if(magnet){
   if(Math.abs(head.x-food.x)<3) food.x+=Math.sign(head.x-food.x);
   if(Math.abs(head.y-food.y)<3) food.y+=Math.sign(head.y-food.y);
  }

  // eat
  if(head.x===food.x&&head.y===food.y){
   score+=alwaysX5?5:mult;
   food=spawn();
  }else snake.pop();

  // bombs
  bombs.forEach((b,i)=>{
   if(head.x===b.x&&head.y===b.y){
    if(shield){shield=false; bombs.splice(i,1); return;}
    if(!godMode) running=false;
   }
   b.life-=16;
   if(b.life<=0) bombs.splice(i,1);
  });

  // mults
  mults.forEach((m,i)=>{
   if(head.x===m.x&&head.y===m.y){
    mult=m.value;
    multTimer=15000;
    mults.splice(i,1);
   }
   m.life-=16;
   if(m.life<=0) mults.splice(i,1);
  });

  // self collision
  if(!ghost && !godMode){
   for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x&&head.y===snake[i].y) running=false;
   }
  }

  // spawn
  if(Math.random()<0.02) bombs.push({...spawn(),life:2000});
  if(Math.random()<0.01) mults.push({...spawn(),value:2+Math.floor(Math.random()*4),life:3000});
 }

 // draw snake trail
 snake.forEach((s,i)=>{
  ctx.fillStyle=`hsl(${(i*30+Date.now()/10)%360},100%,50%)`;
  ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
 });

 // food
 ctx.fillStyle="lime";
 ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

 // bombs
 bombs.forEach(b=>{
  ctx.fillStyle="red";
  ctx.fillRect(b.x*grid,b.y*grid,grid,grid);
 });

 // mults
 mults.forEach(m=>{
  ctx.fillStyle="cyan";
  ctx.fillRect(m.x*grid,m.y*grid,grid,grid);
 });

 // UI
 let txt=`Score:${score} High:${high}`;
 if(alwaysX5) txt+=" | INF x5";
 if(mult>1) txt+=` | x${mult}`;
 document.getElementById("ui").innerText=txt;

 if(score>high){
  high=score;
  localStorage.setItem("high",high);
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
