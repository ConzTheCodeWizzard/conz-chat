<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conz Snake</title>

<style>
html,body{margin:0;background:black;color:red;font-family:Arial;overflow:hidden;}
canvas{display:block;}

.screen{
 position:fixed;width:100%;height:100%;
 display:flex;flex-direction:column;
 justify-content:center;align-items:center;
 text-align:center;background:black;z-index:10;
}

.hidden{display:none;}

button{
 padding:12px 20px;margin:8px;
 border:2px solid red;background:black;color:white;
}

#ui{
 position:fixed;top:10px;left:10px;color:white;
}
#modBtn{
 position:fixed;bottom:20px;right:20px;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>WELCOME TO CONZ SNAKE</h1>
  <button onclick="openPlayer()">START</button>
  <button onclick="openSettings()">SETTINGS</button>
  <button onclick="openMods()">MOD MENU</button>
  <button onclick="openAbout()">ABOUT CONZ</button>
</div>

<div id="aboutScreen" class="screen hidden">
<h2>About the developer of this app</h2>
<div style="color:white;max-width:500px;">
hi, I'm conz iv been coding since I was 13 but took 6 years off away from the hobby, i have coded for 5 years in total...
</div>
<button onclick="back()">BACK</button>
</div>

<div id="playerScreen" class="screen hidden">
<h2>SELECT PLAYER</h2>
<button onclick="selectPlayer('Connor')">Connor</button>
<button onclick="selectPlayer('Emma')">Emma</button>
</div>

<div id="settingsScreen" class="screen hidden">
<h2>SETTINGS</h2>
<button onclick="toggleMusic()">Music: <span id="musicTxt">ON</span></button>
<button onclick="toggleBombs()">Bombs: <span id="bombTxt">ON</span></button>
<button onclick="cycleColor()">Colour: <span id="colorTxt">Green</span></button>
<button onclick="back()">BACK</button>
</div>

<div id="modsScreen" class="screen hidden">
<h2>MODS</h2>
<button onclick="toggleNoClip()">No Clip: <span id="noclipTxt">OFF</span></button>
<button onclick="toggleX5()">Always x5: <span id="x5Txt">OFF</span></button>
<button onclick="toggleGod()">Never Die: <span id="godTxt">OFF</span></button>
<button onclick="resume()">RESUME</button>
<button onclick="back()">MENU</button>
</div>

<div id="gameOver" class="screen hidden">
<h1>💀 YOU DIED 💀</h1>
<button onclick="back()">MENU</button>
</div>

<div id="ui"></div>
<button id="modBtn" onclick="openMods()">MODS</button>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let grid=25,cols,rows;
let snake,dir,food;
let running=false,started=false;

let score=0,high=0,currentPlayer=null;

// SETTINGS / MODS
let noClip=false,alwaysX5=false,godMode=false;
let bombsOn=true,musicOn=true;

let colors=["green","purple","red","rainbow"];
let colorIndex=0;

// TIMING FIX
let lastTime=0;
let speed=120;

// resize
function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
 cols=Math.floor(canvas.width/grid);
 rows=Math.floor(canvas.height/grid);
}
resize();
window.onresize=resize;

// MENU
function hideAll(){document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));}
function back(){hideAll();startScreen.classList.remove("hidden");running=false;}
function openAbout(){hideAll();aboutScreen.classList.remove("hidden");}
function openSettings(){hideAll();settingsScreen.classList.remove("hidden");}
function openMods(){hideAll();modsScreen.classList.remove("hidden");}
function openPlayer(){hideAll();playerScreen.classList.remove("hidden");}
function resume(){hideAll();running=true;requestAnimationFrame(loop);}

// PLAYER
function selectPlayer(name){
 currentPlayer=name;
 high=localStorage.getItem("high_"+name)||0;
 colorIndex=name==="Connor"?2:1;
 startGame();
}

// GAME
function startGame(){
 hideAll();
 init();
 running=true;
 started=false;
 lastTime=0;
 requestAnimationFrame(loop);
}

function init(){
 let cx=Math.floor(cols/2),cy=Math.floor(rows/2);
 snake=[{x:cx,y:cy}];
 dir={x:1,y:0};
 food=spawn();
 score=0;
}

function spawn(){
 return {x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)};
}

// TOUCH FIX (no instant move)
let sx=0,sy=0;
canvas.addEventListener("touchstart",e=>{
 sx=e.touches[0].clientX;
 sy=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-sx;
 let dy=e.changedTouches[0].clientY-sy;

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>0 && dir.x!==-1) dir={x:1,y:0};
  if(dx<0 && dir.x!==1) dir={x:-1,y:0};
 }else{
  if(dy>0 && dir.y!==-1) dir={x:0,y:1};
  if(dy<0 && dir.y!==1) dir={x:0,y:-1};
 }

 started=true;
});

// LOOP (FIXED SPEED)
function loop(time){
 if(!running)return;

 if(time-lastTime>speed){
  lastTime=time;

  if(started){
   let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

   if(noClip){
    head.x=(head.x+cols)%cols;
    head.y=(head.y+rows)%rows;
   }else{
    if(head.x<0||head.y<0||head.x>=cols||head.y>=rows){
     if(!godMode)return gameOver();
     head={...snake[0]};
    }
   }

   snake.unshift(head);

   if(head.x===food.x&&head.y===food.y){
    score+=alwaysX5?5:1;
    food=spawn();
   }else{
    snake.pop();
   }
  }
 }

 draw();
 requestAnimationFrame(loop);
}

function draw(){
 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 snake.forEach((s,i)=>{
  ctx.fillStyle=colors[colorIndex];
  ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
 });

 ctx.fillStyle="lime";
 ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

 ui.innerText=`${currentPlayer} Score:${score} High:${high}`;

 if(score>high){
  high=score;
  localStorage.setItem("high_"+currentPlayer,high);
 }
}

function gameOver(){
 running=false;
 gameOverScreen.classList.remove("hidden");
}

// TOGGLES (FIXED)
function toggleMusic(){
 musicOn=!musicOn;
 musicTxt.innerText=musicOn?"ON":"OFF";
}

function toggleBombs(){
 bombsOn=!bombsOn;
 bombTxt.innerText=bombsOn?"ON":"OFF";
}

function cycleColor(){
 colorIndex=(colorIndex+1)%colors.length;
 colorTxt.innerText=colors[colorIndex];
}

function toggleNoClip(){
 noClip=!noClip;
 noclipTxt.innerText=noClip?"ON":"OFF";
}

function toggleX5(){
 alwaysX5=!alwaysX5;
 x5Txt.innerText=alwaysX5?"ON":"OFF";
}

function toggleGod(){
 godMode=!godMode;
 godTxt.innerText=godMode?"ON":"OFF";
}

// INIT
window.onload=back;
</script>

</body>
</html>
